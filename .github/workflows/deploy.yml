name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Asciidoctor
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y asciidoctor

      - name: Build HTML
        run: |
          mkdir -p _site
          # Convert every .adoc file found in the repo, preserving directory structure
          find . -name "*.adoc" -not -path "./_site/*" | while read f; do
            dir=$(dirname "$f")
            dest="_site/$dir"
            mkdir -p "$dest"
            # Copy all media assets sitting next to the adoc file
            find "$dir" -maxdepth 1 \( -name "*.jpeg" -o -name "*.jpg" -o -name "*.png" -o -name "*.mp4" -o -name "*.gif" -o -name "*.svg" \) \
              -exec cp {} "$dest/" \; 2>/dev/null || true
            asciidoctor \
              --destination-dir "$dest" \
              --attribute icons=font \
              --attribute toc=left \
              --attribute toclevels=3 \
              --attribute numbered \
              --attribute source-highlighter=highlight.js \
              "$f"
          done
          # Build a simple index listing all generated articles
          echo '<!DOCTYPE html>' > _site/index.html
          echo '<html><head><meta charset="utf-8"><title>Blog JMB</title>' >> _site/index.html
          echo '<style>body{font-family:sans-serif;max-width:800px;margin:2em auto}ul{line-height:2}</style>' >> _site/index.html
          echo '</head><body><h1>Blog JMB</h1><ul>' >> _site/index.html
          find _site -name "*.html" -not -name "index.html" | sort | while read f; do
            rel="${f#_site/}"
            title=$(grep -m1 '<title>' "$f" | sed 's/.*<title>\(.*\)<\/title>.*/\1/' || echo "$rel")
            echo "<li><a href=\"$rel\">$title</a></li>" >> _site/index.html
          done
          echo '</ul></body></html>' >> _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
